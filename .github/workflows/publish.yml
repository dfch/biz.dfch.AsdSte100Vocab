name: Publish to PyPI

on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write

jobs:
  publish-to-testpypi:
    name: Publish to TestPyPI
    env:
      # Opt-in to Node 24 to avoid Node 20 deprecation warnings (effective June 2026)
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    runs-on: ubuntu-latest
    environment: testpypi
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install uv
      # uses: astral-sh/setup-uv@v5 v5.2.1
      uses: astral-sh/setup-uv@b5f58b2abc5763ade55e4e9d0fe52cd1ff7979ca

    - name: Build sdist and wheel
      run: uv build

    - name: Publish to TestPyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        repository-url: https://test.pypi.org/legacy/

  publish-to-pypi:
    name: Publish to PyPI
    needs: [publish-to-testpypi]
    runs-on: ubuntu-latest
    environment: pypi
    outputs:
      version: ${{ steps.get_version.outputs.VERSION }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install uv
      # uses: astral-sh/setup-uv@v5 v5.2.1
      uses: astral-sh/setup-uv@b5f58b2abc5763ade55e4e9d0fe52cd1ff7979ca

    - name: Build sdist and wheel
      run: uv build

    - name: Extract version from package
      id: get_version
      run: echo "VERSION=$(uv run python -c 'import importlib.metadata; print(importlib.metadata.version("biz-dfch-ste100vocab"))')" >> $GITHUB_OUTPUT

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1

  create-github-release:
    name: Create GitHub Release
    needs: [publish-to-pypi]
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install uv
      # uses: astral-sh/setup-uv@v5 v5.2.1
      uses: astral-sh/setup-uv@b5f58b2abc5763ade55e4e9d0fe52cd1ff7979ca

    - name: Build sdist and wheel
      run: uv build

    - name: Create GitHub Release
      run: |
        gh release create "v${{ needs.publish-to-pypi.outputs.version }}" \
          dist/* \
          --title "v${{ needs.publish-to-pypi.outputs.version }}" \
          --generate-notes
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
