name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
              uses: astral-sh/setup-uv@v5

            - name: Build sdist and wheel
              run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
